<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>請求書管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; font-size: 14px; }
.container { max-width: 860px; margin: 0 auto; padding: 1.5rem 1rem; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 8px; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
.stat { background: #fff; border-radius: 10px; padding: 0.75rem 1rem; border: 0.5px solid #e0e0d8; }
.stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.stat-value { font-size: 18px; font-weight: 500; }
.tabs { display: flex; gap: 4px; overflow-x: auto; margin-bottom: 1rem; padding-bottom: 2px; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { font-size: 12px; padding: 5px 12px; border: 0.5px solid #d0d0c8; border-radius: 100px; background: #fff; color: #888; cursor: pointer; white-space: nowrap; font-family: inherit; flex-shrink: 0; }
.tab:hover { background: #f0f0e8; color: #333; }
.tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.controls { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
input, select, textarea { font-size: 13px; padding: 7px 10px; border: 0.5px solid #d0d0c8; border-radius: 8px; background: #fff; color: #1a1a1a; outline: none; font-family: inherit; }
input:focus, select:focus, textarea:focus { border-color: #888; }
.controls input { flex: 1; min-width: 160px; }
.btn { font-size: 13px; padding: 7px 14px; border: 0.5px solid #d0d0c8; border-radius: 8px; background: #fff; color: #1a1a1a; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; font-family: inherit; }
.btn:hover { background: #f0f0e8; }
.btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.btn-primary:hover { background: #333; }
.invoice-list { display: flex; flex-direction: column; gap: 8px; }
.invoice-card { background: #fff; border: 0.5px solid #e0e0d8; border-radius: 12px; padding: 0.875rem 1rem; display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
.invoice-card:hover { border-color: #bbb; }
.inv-main { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.inv-num { font-size: 12px; font-weight: 500; color: #888; min-width: 64px; }
.inv-client { font-weight: 500; }
.inv-sub { font-size: 12px; color: #888; }
.inv-actions { display: flex; align-items: center; gap: 6px; }
.inv-amount { font-weight: 500; font-size: 15px; white-space: nowrap; }
.badge { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 100px; }
.badge-draft { background: #f0efe8; color: #555; }
.badge-sent { background: #fde8e8; color: #b01a1a; font-weight:600; }
.badge-paid { background: #dbeafe; color: #1a4fa0; font-weight:600; }
.badge-overdue { background: #fce8e8; color: #8a1a1a; }
.badge-clickable { cursor: pointer; position: relative; user-select: none; }
.badge-clickable:hover { opacity: 0.8; }
.status-backdrop { position: fixed; inset: 0; z-index: 40; }
.status-menu { position: absolute; top: 100%; left: 0; margin-top: 4px; background: #fff; border: 0.5px solid #ddd; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); z-index: 50; min-width: 110px; overflow: hidden; }
.status-menu-item { padding: 8px 12px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.status-menu-item:hover { background: #f5f5f0; }
.status-menu-item.active { font-weight: 500; }
.icon-btn { background: none; border: none; cursor: pointer; color: #999; padding: 5px; border-radius: 6px; display: flex; align-items: center; font-size: 16px; }
.icon-btn:hover { background: #f0f0e8; color: #333; }
.pdf-badge { font-size: 11px; background: #fce8d8; color: #8a3a1a; padding: 3px 8px; border-radius: 100px; text-decoration: none; display: inline-flex; align-items: center; gap: 3px; }
.pdf-badge:hover { background: #f5d0b8; }
.invoice-card { cursor: pointer; }
.detail-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 0.5px solid #f0f0e8; font-size: 13px; }
.detail-row:last-child { border-bottom: none; }
.detail-label { color: #888; font-size: 12px; min-width: 80px; }
.detail-items { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 4px; }
.detail-items th { text-align: left; font-weight: 500; color: #888; font-size: 11px; padding: 4px 6px; border-bottom: 0.5px solid #e0e0d8; }
.detail-items td { padding: 6px 6px; border-bottom: 0.5px solid #f0f0e8; }
.detail-items td:last-child { text-align: right; }
.detail-total { display: flex; justify-content: space-between; font-weight: 500; font-size: 15px; padding-top: 10px; margin-top: 4px; }
.empty { text-align: center; padding: 3rem 1rem; color: #999; }
.loading { text-align: center; padding: 3rem 1rem; color: #999; }
.overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: flex; align-items: flex-start; justify-content: center; padding-top: 1.5rem; z-index: 100; overflow-y: auto; }
.modal { background: #fff; border-radius: 14px; border: 0.5px solid #ddd; padding: 1.5rem; width: 100%; max-width: 520px; margin: 0 1rem 2rem; }
.modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 1.25rem; }
.pdf-zone { border: 1.5px dashed #d0d0c8; border-radius: 10px; padding: 1rem; text-align: center; cursor: pointer; margin-bottom: 1rem; }
.pdf-zone:hover, .pdf-zone.drag { border-color: #888; background: #f8f8f4; }
.pdf-zone-label { font-size: 13px; color: #888; margin-top: 6px; }
.pdf-zone-file { font-size: 12px; color: #2d6b10; margin-top: 6px; font-weight: 500; }
.pdf-zone input[type=file] { display: none; }
.pdf-result { font-size: 12px; margin-top: 8px; padding: 8px 10px; border-radius: 8px; background: #e8f3de; color: #2d6b10; display: none; }
.pdf-result.show { display: block; }
.form-row { margin-bottom: 12px; }
.form-row label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
.form-row input, .form-row select, .form-row textarea { width: 100%; }
.form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1rem; }
.items-section { border: 0.5px solid #e0e0d8; border-radius: 8px; overflow: hidden; margin-top: 4px; }
.items-header { display: grid; grid-template-columns: 1fr 60px 80px 32px; gap: 6px; padding: 6px 8px; background: #f5f5f0; font-size: 11px; color: #888; font-weight: 500; }
.item-row { display: grid; grid-template-columns: 1fr 60px 80px 32px; gap: 6px; padding: 6px 8px; border-top: 0.5px solid #e8e8e0; align-items: center; }
.item-row input { padding: 4px 6px; font-size: 12px; }
.add-item-btn { font-size: 12px; color: #888; background: none; border: none; cursor: pointer; padding: 7px 8px; width: 100%; text-align: left; border-top: 0.5px solid #e8e8e0; font-family: inherit; display: flex; align-items: center; gap: 4px; }
.add-item-btn:hover { background: #f5f5f0; color: #333; }
.subtotal-row { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 4px; }
.total-row { display: flex; justify-content: space-between; font-weight: 500; border-top: 0.5px solid #e0e0d8; padding-top: 8px; margin-top: 4px; }
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }
.top-pdf-zone { display: flex; align-items: center; gap: 10px; border: 1.5px dashed #d0d0c8; border-radius: 10px; padding: 12px 16px; margin-bottom: 1rem; cursor: pointer; background: #fff; color: #999; font-size: 13px; }
.top-pdf-zone:hover, .top-pdf-zone.drag { border-color: #888; background: #f8f8f4; color: #555; }
.top-pdf-zone.loading { border-color: #aaa; color: #888; cursor: wait; }
</style>
</head>
<body>
<div class="container">
  <h1><i class="ti ti-file-invoice"></i>請求書管理</h1>
  <div class="stats" id="stats"></div>
  <div class="tabs" id="tabs"></div>
  <div class="top-pdf-zone" id="top-pdf-zone"
    onclick="document.getElementById('top-pdf-input').click()"
    ondragover="event.preventDefault();this.classList.add('drag')"
    ondragleave="this.classList.remove('drag')"
    ondrop="handleTopDrop(event)">
    <i class="ti ti-file-upload" style="font-size:20px;color:#aaa"></i>
    <span id="top-pdf-label">PDFをここにドロップして請求書を追加</span>
    <input type="file" id="top-pdf-input" accept=".pdf" multiple style="display:none" onchange="handleTopPdfs(this.files)">
  </div>
  <div class="controls">
    <input type="text" id="search" placeholder="顧客名・番号で検索..." oninput="render()">
    <select id="filterStatus" onchange="render()">
      <option value="">すべてのステータス</option>
      <option value="sent">未払い</option>
      <option value="paid">支払済</option>
      <option value="overdue">期限超過</option>
    </select>
    <button class="btn btn-primary" onclick="openNew()"><i class="ti ti-plus"></i>新規作成</button>
  </div>
  <div class="invoice-list" id="list"><div class="loading"><i class="ti ti-loader" style="font-size:24px;display:block;margin:0 auto 8px"></i>読み込み中...</div></div>
</div>
<div id="modal-area"></div>
<div class="toast" id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const API = 'https://script.google.com/macros/s/AKfycbzoAYPvkMoLu5P0GszGzxf3Y4RJ2VKsGhIT2JfxZKWeGM0KodUTaphAaV8ynvAylnUiUQ/exec';
const TAX = 0.1;

const COMPANIES = [
  'AxeGroup㈱', '㈱INCLUDE', '㈱LIMITLESS CREDIT',
  '㈱1.2.3', '㈱Sunny Lab.', '株式会社RIDEPLAN', 'トラストマネー株式会社'
];

const COMPANY_KEYWORDS = {
  'AxeGroup㈱':            ['axegroup', 'axe group', 'アックス'],
  '㈱INCLUDE':             ['include', 'インクルード'],
  '㈱LIMITLESS CREDIT':    ['limitless', 'リミットレス'],
  '㈱1.2.3':               ['1.2.3'],
  '㈱Sunny Lab.':          ['sunny lab', 'sunnylab', 'サニーラボ'],
  '株式会社RIDEPLAN':      ['rideplan', 'ride plan', 'ライドプラン'],
  'トラストマネー株式会社': ['トラストマネー', 'trustmoney', 'trust money']
};

let invoices = [], editId = null, activeTab = 'all', pendingPdfFile = null, formItems = [];

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

async function apiGet(params) {
  const res = await fetch(API + '?' + new URLSearchParams(params).toString());
  return res.json();
}

async function uploadPdfToDrive(file) {
  try {
    const base64 = await fileToBase64(file);
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'uploadPdf', base64, filename: file.name })
    });
    const data = await res.json();
    return data.url || '';
  } catch(e) { return ''; }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function extractTextFromPdf(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let text = '';
  for (let i = 1; i <= Math.min(pdf.numPages, 3); i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(item => item.str).join(' ') + '\n';
  }
  return text;
}

// 全角→半角変換
function norm(text) {
  return text.replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
}

function detectCompany(text) {
  const n = norm(text).toLowerCase();
  for (const [company, keywords] of Object.entries(COMPANY_KEYWORDS)) {
    for (const kw of keywords) {
      if (n.includes(kw.toLowerCase())) return company;
    }
  }
  return '';
}

function detectDueDate(text) {
  const stripped = norm(text).replace(/\s/g, '');

  // パターン1: 年月日ありの標準形式
  const stdPatterns = [
    [/口座振替日.{0,10}令和(\d+)年(\d{1,2})月(\d{1,2})日/, true],
    [/振替日.{0,10}令和(\d+)年(\d{1,2})月(\d{1,2})日/, true],
    [/支払期限.{0,10}令和(\d+)年(\d{1,2})月(\d{1,2})日/, true],
    [/令和(\d+)年(\d{1,2})月(\d{1,2})日/, true],
    [/支払期限.{0,10}(\d{4})[\/年](\d{1,2})[\/月](\d{1,2})/, false],
  ];
  for (const [re, isReiwa] of stdPatterns) {
    const m = stripped.match(re);
    if (!m) continue;
    return isReiwa ? reiwaFmt(m[1], m[2], m[3]) : `${m[1]}-${pad(m[2])}-${pad(m[3])}`;
  }

  // パターン2: 年月日なし・直後に金額が来る形式 (例: 令和862930,000 → 8年6月29日)
  const re2 = /令和(\d{1,2})(\d{1,2})(\d{2})(?=\d{1,3},\d{3})/g;
  let m2;
  while ((m2 = re2.exec(stripped)) !== null) {
    const y = parseInt(m2[1]), mo = parseInt(m2[2]), d = parseInt(m2[3]);
    if (mo >= 1 && mo <= 12 && d >= 1 && d <= 31) {
      return reiwaFmt(y, mo, d);
    }
  }

  return '';
}

function detectAmount(text) {
  const n = norm(text).replace(/\s/g, '');
  // 全カンマ区切り金額を抽出し、最も多く出現するものを返す
  const counts = {};
  const re = /\d{1,3}(?:,\d{3})+/g;
  let m;
  while ((m = re.exec(n)) !== null) {
    const v = parseInt(m[0].replace(/,/g, ''));
    if (v >= 1000) counts[v] = (counts[v] || 0) + 1;
  }
  if (Object.keys(counts).length === 0) return 0;
  return Object.entries(counts).reduce((best, [amt, cnt]) => {
    const [bAmt, bCnt] = best;
    return cnt > bCnt || (cnt === bCnt && Number(amt) > bAmt) ? [Number(amt), cnt] : best;
  }, [0, 0])[0];
}

function detectDesc(text) {
  const n = norm(text).replace(/\s+/g, ' ');
  // 内訳欄から摘要を取得
  const m = n.match(/内\s*訳\s*金\s*額[\s\S]{0,10}取引日[\s\S]{0,5}([぀-鿿\w]+月決報酬|[぀-鿿\w]+報酬|[぀-鿿\w]+費)/);
  if (m) return m[1];
  return '';
}

function reiwaFmt(y, m, d) {
  return `${2018 + parseInt(y)}-${pad(m)}-${pad(d)}`;
}

function drivePreview(url) {
  const m = url.match(/\/file\/d\/([^\/]+)/);
  if (m) return `https://drive.google.com/file/d/${m[1]}/preview`;
  return url;
}
function pad(n) { return String(n).padStart(2, '0'); }

async function loadInvoices() {
  try {
    invoices = await apiGet({});
    render();
  } catch(e) {
    document.getElementById('list').innerHTML = '<div class="empty">データの読み込みに失敗しました。再読み込みしてください。</div>';
  }
}

function subtotal(items) { return items.reduce((s,i) => s + Number(i.qty||0) * Number(i.price||0), 0); }
function total(items) { return Math.round(subtotal(items) * (1 + TAX)); }
function fmt(n) { return '¥' + Math.round(n).toLocaleString('ja-JP'); }

const STATUS_LIST = [
  { key:'sent',    label:'未払い',   cls:'badge-sent' },
  { key:'paid',    label:'支払済み', cls:'badge-paid' },
  { key:'overdue', label:'期限超過', cls:'badge-overdue' },
];

function badgeHtml(s, invId) {
  const cur = STATUS_LIST.find(x => x.key === s) || STATUS_LIST[0];
  if (!invId) return `<span class="badge ${cur.cls}">${cur.label}</span>`;
  return `<span class="badge ${cur.cls} badge-clickable" onclick="event.stopPropagation();toggleStatusMenu('${invId}',this)">
    ${cur.label} <i class="ti ti-chevron-down" style="font-size:10px;vertical-align:middle"></i>
  </span>`;
}

function toggleStatusMenu(id, el) {
  document.querySelectorAll('.status-menu,.status-backdrop').forEach(m => m.remove());
  const inv = invoices.find(i => i.id === id);
  if (!inv) return;

  const backdrop = document.createElement('div');
  backdrop.className = 'status-backdrop';

  const menu = document.createElement('div');
  menu.className = 'status-menu';
  STATUS_LIST.forEach(s => {
    const item = document.createElement('div');
    item.className = 'status-menu-item' + (inv.status === s.key ? ' active' : '');
    item.innerHTML = `<span class="badge ${s.cls}">${s.label}</span>`;
    item.addEventListener('click', e => {
      e.stopPropagation();
      backdrop.remove();
      menu.remove();
      changeStatus(id, s.key);
    });
    menu.appendChild(item);
  });

  backdrop.addEventListener('click', e => {
    e.stopPropagation();
    backdrop.remove();
    menu.remove();
  });

  document.body.appendChild(backdrop);
  el.style.position = 'relative';
  el.appendChild(menu);
}

async function changeStatus(id, status) {
  document.querySelectorAll('.status-menu').forEach(m => m.remove());
  const inv = invoices.find(i => i.id === id);
  if (!inv) return;
  inv.status = status;
  await apiGet({ action: 'save', invoice: JSON.stringify(inv) });
  render();
  toast('ステータスを更新しました');
}

function renderTabs() {
  const all = [{ key:'all', label:'すべて' }, ...COMPANIES.map(c => ({ key:c, label:c }))];
  document.getElementById('tabs').innerHTML = all.map(t =>
    `<button class="tab ${activeTab===t.key?'active':''}" onclick="setTab('${t.key.replace(/'/g,"\\'")}'">${t.label}</button>`
  ).join('');
}

function setTab(key) { activeTab = key; renderTabs(); render(); }

function renderStats() {
  const src = activeTab === 'all' ? invoices : invoices.filter(i => i.client === activeTab);
  const paid = src.filter(i=>i.status==='paid').reduce((s,i)=>s+total(i.items),0);
  const unpaid = src.filter(i=>i.status==='sent').reduce((s,i)=>s+total(i.items),0);
  const overdue = src.filter(i=>i.status==='overdue').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">件数</div><div class="stat-value">${src.length}件</div></div>
    <div class="stat"><div class="stat-label">入金済</div><div class="stat-value" style="color:#2d6b10">${fmt(paid)}</div></div>
    <div class="stat"><div class="stat-label">未収</div><div class="stat-value" style="color:#185fa5">${fmt(unpaid)}</div></div>
    <div class="stat"><div class="stat-label">期限超過</div><div class="stat-value" style="color:#8a1a1a">${overdue}件</div></div>
  `;
}

function render() {
  renderTabs(); renderStats();
  const q = document.getElementById('search').value.toLowerCase();
  const sf = document.getElementById('filterStatus').value;
  let list = activeTab === 'all' ? invoices : invoices.filter(i => i.client === activeTab);
  if (q) list = list.filter(i => (i.client||'').toLowerCase().includes(q) || (i.id||'').toLowerCase().includes(q));
  if (sf) list = list.filter(i => i.status === sf);
  const el = document.getElementById('list');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><i class="ti ti-file-off" style="font-size:32px;display:block;margin:0 auto 8px"></i>請求書がありません</div>';
    return;
  }
  el.innerHTML = list.map(inv => `
    <div class="invoice-card" onclick="openDetail('${inv.id}')">
      <div class="inv-main">
        <span class="inv-num">${inv.id}</span>
        <div>
          <div class="inv-client">${inv.client}</div>
          <div class="inv-sub">${inv.desc ? inv.desc + ' &nbsp;•&nbsp; ' : ''}期限: ${inv.dueDate}</div>
        </div>
        ${badgeHtml(inv.status, inv.id)}
        ${inv.fileUrl ? `<a href="${inv.fileUrl}" target="_blank" class="pdf-badge" onclick="event.stopPropagation()"><i class="ti ti-file-type-pdf" style="font-size:12px"></i>PDF</a>` : ''}
      </div>
      <div class="inv-actions" onclick="event.stopPropagation()">
        <div class="inv-amount">${fmt(total(inv.items))}</div>
        <button class="icon-btn" onclick="openEdit('${inv.id}')" title="編集"><i class="ti ti-edit"></i></button>
        <button class="icon-btn" onclick="deleteInv('${inv.id}')" title="削除"><i class="ti ti-trash"></i></button>
      </div>
    </div>`).join('');
}

function openDetail(id) {
  const inv = invoices.find(i => i.id === id);
  if (!inv) return;
  const st = subtotal(inv.items), tax = Math.round(st * TAX);
  const statusMap = { draft:'下書き', sent:'送付済', paid:'支払済', overdue:'期限超過' };
  document.getElementById('modal-area').innerHTML = `
    <div class="overlay" id="overlay" onclick="closeOnOverlay(event)">
      <div class="modal">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
          <h2 style="margin:0">請求書詳細</h2>
          <div style="display:flex;gap:6px">
            <button class="btn" onclick="openEdit('${inv.id}');"><i class="ti ti-edit"></i>編集</button>
            <button class="icon-btn" onclick="closeModal()" style="font-size:18px"><i class="ti ti-x"></i></button>
          </div>
        </div>
        <div class="detail-row"><span class="detail-label">請求番号</span><span>${inv.id}</span></div>
        <div class="detail-row"><span class="detail-label">支払先</span><span style="font-weight:500">${inv.client}</span></div>
        <div class="detail-row"><span class="detail-label">ステータス</span>${badgeHtml(inv.status)}</div>
        <div class="detail-row"><span class="detail-label">発行日</span><span>${inv.issueDate}</span></div>
        <div class="detail-row"><span class="detail-label">支払期限</span><span>${inv.dueDate}</span></div>
        ${inv.desc ? `<div class="detail-row"><span class="detail-label">件名</span><span>${inv.desc}</span></div>` : ''}
        ${inv.fileUrl ? `
        <div style="margin-top:12px;margin-bottom:4px">
          <div style="font-size:12px;color:#888;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
            <span>PDF</span>
            <a href="${inv.fileUrl}" target="_blank" class="pdf-badge"><i class="ti ti-external-link" style="font-size:12px"></i>新しいタブで開く</a>
          </div>
          <iframe src="${drivePreview(inv.fileUrl)}"
            style="width:100%;height:420px;border:0.5px solid #e0e0d8;border-radius:8px"
            allowfullscreen
            onerror="this.style.display='none';document.getElementById('pdf-fallback-${inv.id}').style.display='flex'"></iframe>
          <div id="pdf-fallback-${inv.id}" style="display:none;height:120px;align-items:center;justify-content:center;border:0.5px solid #e0e0d8;border-radius:8px;flex-direction:column;gap:8px;color:#888;font-size:13px">
            <i class="ti ti-file-type-pdf" style="font-size:32px;color:#ccc"></i>
            <a href="${inv.fileUrl}" target="_blank" class="btn btn-primary">PDFを開く</a>
          </div>
        </div>` : ''}
        <div style="margin-top:12px">
          <div style="font-size:12px;color:#888;margin-bottom:6px">明細</div>
          <table class="detail-items">
            <thead><tr><th>品目</th><th style="text-align:right">数量</th><th style="text-align:right">単価</th><th style="text-align:right">金額</th></tr></thead>
            <tbody>${inv.items.map(it => `<tr>
              <td>${it.name || '-'}</td>
              <td style="text-align:right">${it.qty}</td>
              <td style="text-align:right">${fmt(it.price)}</td>
              <td style="text-align:right">${fmt(it.qty * it.price)}</td>
            </tr>`).join('')}</tbody>
          </table>
          <div style="margin-top:8px;text-align:right;font-size:12px;color:#888">
            <div>小計 ${fmt(st)}</div>
            <div>消費税 (10%) ${fmt(tax)}</div>
          </div>
          <div class="detail-total"><span>合計</span><span>${fmt(st + tax)}</span></div>
        </div>
      </div>
    </div>`;
}

function openNew() {
  editId = null; pendingPdfFile = null;
  const today = new Date().toISOString().slice(0,10);
  const due = new Date(Date.now()+30*86400000).toISOString().slice(0,10);
  const nextNum = 'INV-' + String(invoices.length+1).padStart(3,'0');
  formItems = [{name:'',qty:1,price:0}];
  showModal({ id:nextNum, client: activeTab !== 'all' ? activeTab : '', desc:'', issueDate:today, dueDate:due, status:'sent', fileUrl:'' });
}

function openEdit(id) {
  editId = id; pendingPdfFile = null;
  const inv = invoices.find(i=>i.id===id);
  formItems = inv.items.map(i=>({...i}));
  showModal(inv);
}

function showModal(inv) {
  const opts = COMPANIES.map(c => `<option value="${c}" ${inv.client===c?'selected':''}>${c}</option>`).join('');
  document.getElementById('modal-area').innerHTML = `
    <div class="overlay" id="overlay" onclick="closeOnOverlay(event)">
      <div class="modal">
        <h2>${editId ? '請求書を編集' : '新規請求書'}</h2>
        <div class="pdf-zone" id="pdf-zone"
          onclick="document.getElementById('pdf-input').click()"
          ondragover="event.preventDefault();this.classList.add('drag')"
          ondragleave="this.classList.remove('drag')"
          ondrop="handleDrop(event)">
          <i class="ti ti-file-type-pdf" style="font-size:28px;color:#ccc"></i>
          <div class="pdf-zone-label">PDFをドロップ、またはクリックして選択</div>
          <div class="pdf-zone-file" id="pdf-filename">${inv.fileUrl ? '既存PDFあり' : ''}</div>
          <input type="file" id="pdf-input" accept=".pdf" onchange="handlePdfSelect(this.files[0])">
        </div>
        <div class="pdf-result" id="pdf-result"></div>
        <textarea id="pdf-debug" style="width:100%;height:120px;font-size:11px;margin-bottom:8px;font-family:monospace" placeholder="PDFを読み込むとここにテキストが表示されます"></textarea>
        <div class="form-2col">
          <div class="form-row"><label>請求番号</label><input id="f-id" value="${inv.id}"></div>
          <div class="form-row"><label>ステータス</label><select id="f-status">
            <option value="sent" ${inv.status==='sent'||inv.status==='draft'?'selected':''}>未払い</option>
            <option value="paid" ${inv.status==='paid'?'selected':''}>支払済み</option>
            <option value="overdue" ${inv.status==='overdue'?'selected':''}>期限超過</option>
          </select></div>
        </div>
        <div class="form-row"><label>会社</label>
          <select id="f-client"><option value="">選択してください</option>${opts}</select>
        </div>
        <div class="form-2col">
          <div class="form-row"><label>発行日</label><input type="date" id="f-issue" value="${inv.issueDate}"></div>
          <div class="form-row"><label>支払期限</label><input type="date" id="f-due" value="${inv.dueDate}"></div>
        </div>
        <div class="form-row"><label>件名・摘要</label><input id="f-desc" value="${inv.desc||''}" placeholder="月決報酬 など"></div>
        <div class="form-row"><label>明細</label>
          <div class="items-section">
            <div class="items-header"><span>品目</span><span style="text-align:right">数量</span><span style="text-align:right">単価</span><span></span></div>
            <div id="f-items"></div>
            <button class="add-item-btn" onclick="addItem()"><i class="ti ti-plus" style="font-size:12px"></i> 行を追加</button>
          </div>
          <div style="margin-top:8px" id="f-totals"></div>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal()">キャンセル</button>
          <button class="btn btn-primary" id="save-btn" onclick="saveInv()">保存</button>
        </div>
      </div>
    </div>`;
  renderItems();
}

function handleTopDrop(e) {
  e.preventDefault();
  document.getElementById('top-pdf-zone').classList.remove('drag');
  const files = [...e.dataTransfer.files].filter(f => f.type === 'application/pdf');
  if (files.length > 0) handleTopPdfs(files);
}

async function handleTopPdfs(fileList) {
  const files = [...fileList].filter(f => f.type === 'application/pdf');
  if (files.length === 0) return;
  if (files.length === 1) { handleTopPdf(files[0]); return; }

  // 複数ファイル: 順番に自動保存
  const zone = document.getElementById('top-pdf-zone');
  const label = document.getElementById('top-pdf-label');
  zone.classList.add('loading');
  let done = 0, failed = 0;
  for (const file of files) {
    label.textContent = `処理中 ${done + failed + 1} / ${files.length}：${file.name}`;
    try {
      const text = await extractTextFromPdf(file);
      const company = detectCompany(text);
      const dueDate = detectDueDate(text);
      const amount  = detectAmount(text);
      const desc    = detectDesc(text);
      const today   = new Date().toISOString().slice(0,10);
      const nextNum = 'INV-' + String(invoices.length + 1).padStart(3,'0');
      const fileUrl = await uploadPdfToDrive(file);
      const inv = {
        id: nextNum,
        client: company || '',
        desc: desc || '',
        issueDate: today,
        dueDate: dueDate || new Date(Date.now() + 30*86400000).toISOString().slice(0,10),
        status: 'draft',
        items: amount > 0 ? [{ name: desc || 'ご請求分', qty: 1, price: Math.round(amount / 1.1) }] : [{ name: '', qty: 1, price: 0 }],
        fileUrl
      };
      await apiGet({ action: 'save', invoice: JSON.stringify(inv) });
      invoices.unshift(inv);
      done++;
    } catch(e) { failed++; }
  }
  zone.classList.remove('loading');
  label.textContent = 'PDFをここにドロップして請求書を追加';
  document.getElementById('top-pdf-input').value = '';
  render();
  toast(`${done}件を保存しました${failed > 0 ? `（${failed}件失敗）` : ''}`);
}

async function handleTopPdf(file) {
  if (!file) return;
  const zone = document.getElementById('top-pdf-zone');
  const label = document.getElementById('top-pdf-label');
  zone.classList.add('loading');
  label.textContent = 'PDF解析中...';
  try {
    const text = await extractTextFromPdf(file);
    const company  = detectCompany(text);
    const dueDate  = detectDueDate(text);
    const amount   = detectAmount(text);
    const desc     = detectDesc(text);
    const today    = new Date().toISOString().slice(0,10);
    const nextNum  = 'INV-' + String(invoices.length + 1).padStart(3,'0');
    editId = null;
    pendingPdfFile = file;
    formItems = amount > 0
      ? [{ name: desc || 'ご請求分', qty: 1, price: Math.round(amount / 1.1) }]
      : [{ name: '', qty: 1, price: 0 }];
    showModal({
      id: nextNum,
      client: company || (activeTab !== 'all' ? activeTab : ''),
      desc: desc || '',
      issueDate: today,
      dueDate: dueDate || new Date(Date.now() + 30*86400000).toISOString().slice(0,10),
      status: 'draft',
      fileUrl: ''
    });
    const fn = document.getElementById('pdf-filename');
    if (fn) fn.textContent = file.name;
    const result = document.getElementById('pdf-result');
    if (result) {
      const detected = [];
      if (company) detected.push('会社名');
      if (dueDate) detected.push('支払期限');
      if (amount > 0) detected.push(`金額 ¥${amount.toLocaleString('ja-JP')}`);
      if (detected.length > 0) {
        result.textContent = '✓ 自動入力: ' + detected.join('、');
        result.classList.add('show');
      }
    }
  } catch(e) {
    label.textContent = 'PDFの読み込みに失敗しました';
  } finally {
    zone.classList.remove('loading');
    label.textContent = 'PDFをここにドロップして請求書を追加';
    document.getElementById('top-pdf-input').value = '';
  }
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('pdf-zone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') handlePdfSelect(file);
}

async function handlePdfSelect(file) {
  if (!file) return;
  pendingPdfFile = file;
  document.getElementById('pdf-filename').textContent = file.name;
  document.querySelector('.pdf-zone-label').textContent = 'PDF解析中...';
  document.getElementById('pdf-result').classList.remove('show');
  try {
    const text = await extractTextFromPdf(file);
    // デバッグ: 抽出テキストを画面に表示
    const dbg = document.getElementById('pdf-debug');
    if (dbg) dbg.value = '[スペース除去後]\n' + norm(text).replace(/\s/g,'').slice(0, 1500);
    const company  = detectCompany(text);
    const dueDate  = detectDueDate(text);
    const amount   = detectAmount(text);
    const desc     = detectDesc(text);

    const detected = [];

    if (company) {
      document.getElementById('f-client').value = company;
      detected.push('会社名');
    }
    if (dueDate) {
      document.getElementById('f-due').value = dueDate;
      detected.push('支払期限');
    }
    if (amount > 0) {
      // PDF金額は源泉控除後の最終支払額なので、10%税計算後に一致するよう割り戻す
      formItems = [{ name: desc || 'ご請求分', qty: 1, price: Math.round(amount / 1.1) }];
      renderItems();
      detected.push(`金額 ${fmt(amount)}`);
    }
    if (desc && !amount) {
      document.getElementById('f-desc').value = desc;
    }

    const result = document.getElementById('pdf-result');
    if (detected.length > 0) {
      result.textContent = '✓ 自動入力: ' + detected.join('、');
      result.classList.add('show');
    }
    document.querySelector('.pdf-zone-label').textContent = 'PDFを読み込みました';
  } catch(e) {
    document.querySelector('.pdf-zone-label').textContent = 'PDFを選択しました（解析失敗）';
  }
}

function renderItems() {
  document.getElementById('f-items').innerHTML = formItems.map((it,i) => `
    <div class="item-row">
      <input value="${it.name}" oninput="formItems[${i}].name=this.value" placeholder="品目名">
      <input type="number" value="${it.qty}" min="1" oninput="formItems[${i}].qty=this.value;updTotals()" style="text-align:right">
      <input type="number" value="${it.price}" min="0" oninput="formItems[${i}].price=this.value;updTotals()" style="text-align:right">
      <button class="icon-btn" onclick="removeItem(${i})"><i class="ti ti-x" style="font-size:14px"></i></button>
    </div>`).join('');
  updTotals();
}

function updTotals() {
  const st = subtotal(formItems), tax = Math.round(st * TAX);
  document.getElementById('f-totals').innerHTML = `
    <div class="subtotal-row"><span>小計</span><span>${fmt(st)}</span></div>
    <div class="subtotal-row"><span>消費税 (10%)</span><span>${fmt(tax)}</span></div>
    <div class="total-row"><span>合計</span><span>${fmt(st+tax)}</span></div>`;
}

function addItem() { formItems.push({name:'',qty:1,price:0}); renderItems(); }
function removeItem(i) { if(formItems.length>1){ formItems.splice(i,1); renderItems(); } }

async function saveInv() {
  const inv = {
    id: document.getElementById('f-id').value.trim(),
    client: document.getElementById('f-client').value.trim(),
    desc: document.getElementById('f-desc').value.trim(),
    issueDate: document.getElementById('f-issue').value,
    dueDate: document.getElementById('f-due').value,
    status: document.getElementById('f-status').value,
    items: formItems.map(i => ({ name:i.name, qty:Number(i.qty), price:Number(i.price) })),
    fileUrl: editId ? ((invoices.find(i=>i.id===editId)||{}).fileUrl||'') : ''
  };
  if (!inv.id || !inv.client) { alert('請求番号と会社名は必須です'); return; }
  const btn = document.getElementById('save-btn');
  btn.textContent = '保存中...'; btn.disabled = true;
  if (pendingPdfFile) {
    btn.textContent = 'PDF保存中...';
    inv.fileUrl = await uploadPdfToDrive(pendingPdfFile);
  }
  await apiGet({ action: 'save', invoice: JSON.stringify(inv) });
  if (editId) invoices[invoices.findIndex(i=>i.id===editId)] = inv;
  else invoices.unshift(inv);
  closeModal(); render(); toast('保存しました');
}

async function deleteInv(id) {
  if (!confirm('この請求書を削除しますか？')) return;
  await apiGet({ action: 'delete', id });
  invoices = invoices.filter(i => i.id !== id);
  render(); toast('削除しました');
}

function closeModal() { document.getElementById('modal-area').innerHTML = ''; pendingPdfFile = null; }
function closeOnOverlay(e) { if(e.target.id==='overlay') closeModal(); }

loadInvoices();
</script>
</body>
</html>
